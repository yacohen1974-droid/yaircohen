# Mutations for Yair Cohen Mortgage Website

# Create or update a page (called via server-side API routes)
mutation UpsertPage($pageId: String!, $content: Any!) @auth(level: PUBLIC, insecureReason: "Executed only via server-side API endpoints that perform application-level verification") {
  page_upsert(data: {
    pageId: $pageId
    content: $content
  })
}

# Delete a page by ID (called via server-side API routes)
mutation DeletePage($pageId: String!) @auth(level: PUBLIC, insecureReason: "Executed only via server-side API endpoints that perform application-level verification") {
  page_delete(key: { pageId: $pageId })
}

# Create or update a blog post (called via server-side API routes)
mutation UpsertBlogPost(
  $id: String!
  $title: String!
  $content: String!
  $slug: String!
  $category: String
  $tags: [String!]
  $published: Boolean!
  $excerpt: String
  $heroImageUrlDesktop: String
  $heroImageUrlMobile: String
  $author: String
  $seoTitle: String
  $seoDescription: String
) @auth(level: PUBLIC, insecureReason: "Executed only via server-side API endpoints that perform application-level verification") {
  blogPost_upsert(data: {
    id: $id
    title: $title
    content: $content
    slug: $slug
    category: $category
    tags: $tags
    published: $published
    excerpt: $excerpt
    heroImageUrlDesktop: $heroImageUrlDesktop
    heroImageUrlMobile: $heroImageUrlMobile
    author: $author
    seoTitle: $seoTitle
    seoDescription: $seoDescription
    updatedAt_expr: "request.time"
  })
}

# Delete a blog post by ID (called via server-side API routes)
mutation DeleteBlogPost($id: String!) @auth(level: PUBLIC, insecureReason: "Executed only via server-side API endpoints that perform application-level verification") {
  blogPost_delete(id: $id)
}
